<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Project Hub brand mark: steelyard green (--primary) rounded square + near-black "P"
       (--primary-foreground), echoing the sidebar brand block in src/components/Sidebar.tsx -->
  <rect width="32" height="32" rx="7" fill="#6AC08B"/>
  <text x="16" y="17" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="800" fill="#0D1217">P</text>
</svg>
